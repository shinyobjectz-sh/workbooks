# Explicit wasm32 build flags.
#
# getrandom 0.3+ requires --cfg getrandom_backend="wasm_js" for the
# wasm32-unknown-unknown target since that target has no native randomness
# source. We route through getrandom's wasm_js backend which calls into
# crypto.getRandomValues in the browser.
[target.wasm32-unknown-unknown]
rustflags = [
    '--cfg', 'getrandom_backend="wasm_js"',
]

# Apple's bundled clang doesn't ship the wasm32 backend, so any C-deps
# (lz4-sys for parquet, rusqlite-bundled, duckdb-bundled) fail with "No
# available targets are compatible with triple wasm32-unknown-unknown".
# Route C compilation through Homebrew LLVM, which DOES include wasm32.
#
# Set these via env if the path is different on another machine:
#   export CC_wasm32_unknown_unknown=/opt/homebrew/opt/llvm/bin/clang
#   export AR_wasm32_unknown_unknown=/opt/homebrew/opt/llvm/bin/llvm-ar
#
# We don't hard-code the path in cargo config because it varies per machine.
[env]
# Hint to the cc crate which compiler to use for the wasm target.
# Override by exporting the env var of the same name in your shell.
